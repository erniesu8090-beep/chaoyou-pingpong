<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- 背景漸變 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1329" />
      <stop offset="100%" stop-color="#1d2d50" />
    </linearGradient>
    
    <!-- 藍色球拍漸變 -->
    <linearGradient id="racketBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- 紫色球拍漸變 -->
    <linearGradient id="racketPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f355da" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>

    <!-- 黃色發光球體漸變 -->
    <radialGradient id="ballGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#fff366" />
      <stop offset="100%" stop-color="#ff9f00" />
    </radialGradient>

    <!-- 霓虹發光濾鏡 -->
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glowBall" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feColorMatrix type="matrix" values="1 0 0 0 1   0 1 0 0 0.8   0 0 1 0 0   0 0 0 1 0" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 圓角背景 (Maskable Icon 推薦安全區域) -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)" />

  <!-- 背景網格微光裝飾 -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="2" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255, 255, 255, 0.02)" stroke-width="1.5" />

  <!-- 裝飾運動軌跡 -->
  <path d="M 120 380 Q 220 280 340 200" fill="none" stroke="rgba(0, 242, 254, 0.15)" stroke-width="6" stroke-linecap="round" filter="url(#glowBlue)" />
  <path d="M 160 410 Q 260 300 370 210" fill="none" stroke="rgba(243, 85, 218, 0.15)" stroke-width="4" stroke-linecap="round" />

  <!-- 球拍 2：紫色球拍 (底部/右側) -->
  <g transform="translate(15, -15)">
    <!-- 握柄 -->
    <rect x="290" y="320" width="36" height="110" rx="10" fill="#2d134d" transform="rotate(35, 308, 375)" stroke="rgba(243, 85, 218, 0.4)" stroke-width="2" />
    <!-- 拍身 -->
    <circle cx="240" cy="260" r="100" fill="url(#racketPurple)" stroke="#ffffff" stroke-width="3" filter="drop-shadow(0 8px 16px rgba(112,0,255,0.4))" />
    <path d="M 140 260 A 100 100 0 0 0 340 260 Z" fill="rgba(0,0,0,0.15)" />
  </g>

  <!-- 球拍 1：藍色球拍 (頂部/左側) -->
  <g transform="translate(-15, 15)">
    <!-- 握柄 -->
    <rect x="186" y="320" width="36" height="110" rx="10" fill="#0d2e3b" transform="rotate(-35, 204, 375)" stroke="rgba(0, 242, 254, 0.4)" stroke-width="2" />
    <!-- 拍身 -->
    <circle cx="272" cy="260" r="100" fill="url(#racketBlue)" stroke="#ffffff" stroke-width="3" filter="drop-shadow(0 8px 16px rgba(0,242,254,0.4))" />
    <!-- 膠皮陰影線 -->
    <path d="M 172 260 A 100 100 0 0 0 372 260 Z" fill="rgba(255,255,255,0.1)" />
  </g>

  <!-- 桌球 (發光黃色小球) -->
  <circle cx="256" cy="170" r="32" fill="url(#ballGrad)" filter="url(#glowBall)" />

  <!-- 精緻「朝友」霓虹發光字樣 -->
  <g transform="translate(256, 460)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="52" fill="#ffffff" text-anchor="middle" letter-spacing="4" filter="drop-shadow(0 2px 8px rgba(0,242,254,0.6))">
      朝友桌球
    </text>
  </g>
</svg>
